services:
  game:
    build:
      context: .
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - pnpm_store:/pnpm/store
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: sh -lc "pnpm install && pnpm dev"

volumes:
  node_modules:
  pnpm_store:
